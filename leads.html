<script>
const DATA = [{"company": "앤서스랩코리아", "service": "it_servicing", "fit": 70.0, "hiring": "5", "industry": "블록체인/게임", "tech": "Node.js, AI", "region": "서울 강남", "roles": "BlockChain Backend Engineer (Node.js), Platform Backend Engineer (Node.js), Data Scientist, Data QA, Data Quality Engineer", "url": "", "contact_name": "", "contact_title": "", "email": "", "linkedin": "", "verdict": "fit", "confidence": "high", "reason": "Tech-enabled blockchain/gaming firm with confirmed 90 employees (in 20-300 range) and five open mid-level dev/QA/data roles, indicating strong hiring pressure.", "message": "[English]\n\nHi there,\n\nI came across 앤서스랩코리아's current hiring push—five open IT roles spanning blockchain and platform backend (Node.js), data science, and data QA caught my attention, especially as your team scales its AI and blockchain gaming work. Filling that many specialized roles at once is no small task, and the timelines can be tough to hit with local hiring alone. At Springboard Philippines, we help Korean companies like yours access vetted Filipino engineers—strong Node.js and AI/data talent who integrate smoothly with Korean teams and time zones. We could support these openings through our IT servicing model, so you can move faster without stretching your internal recruiting. Would you be open to a quick 15-minute call to see if it's a fit?\n\nWarm regards,\n\n──────────\n\n[한국어]\n\n안녕하세요, 앤서스랩코리아 채용 담당자님.\n\n최근 앤서스랩코리아에서 블록체인 및 플랫폼 백엔드(Node.js), 데이터 사이언티스트, 데이터 QA 등 IT 직무 다섯 자리를 채용 중이신 것을 보고 연락드립니다. 특히 AI와 블록체인 게임 분야를 확장해 나가시는 시점에, 이렇게 여러 전문 직무를 동시에 채워야 하는 상황은 결코 쉽지 않으실 것이라 생각합니다. 저희 Springboard Philippines는 한국 기업들이 검증된 필리핀 IT 인재를 만날 수 있도록 돕고 있으며, Node.js와 AI/데이터 역량이 뛰어나면서도 한국 팀 및 시차에 자연스럽게 어우러지는 인력을 소개해 드리고 있습니다. 저희 IT 서비싱 모델을 통해 이번 채용을 지원해 드린다면, 내부 채용 부담을 덜면서도 더 빠르게 인력을 확보하실 수 있을 것입니다. 혹시 서로 잘 맞을지 편하게 확인해 볼 수 있도록 15분 정도 짧은 통화 시간을 내주실 수 있을까요?\n\n감사합니다."}, {"company": "택토", "service": "it_servicing", "fit": 54.0, "hiring": "3", "industry": "IT/소프트웨어 SaaS", "tech": "", "region": "서울 강남", "roles": "백엔드 개발자, SEO 풀스택 개발자, 경영전략 기획", "url": "", "contact_name": "", "contact_title": "", "email": "", "linkedin": "", "verdict": "fit", "confidence": "high", "reason": "SaaS company (tech-enabled) with 80 employees (within 20-300) and multiple open developer roles (backend, full-stack), satisfying all three strict criteria.", "message": "[English]\n\nHi there,\n\nI came across 택토 and noticed you're currently hiring across a few technical roles—a backend developer, an SEO full-stack developer, and a strategic planning position. Scaling a SaaS product on three fronts at once is exciting, but I imagine filling those seats quickly (and well) is no small task. At Springboard Philippines, we help Korean SaaS companies like yours plug in vetted Filipino IT talent, so you can keep momentum without the long hiring runway. It might be a lighter, faster complement to your current search. Would you be open to a quick 15-minute call to see if it's a fit?\n\nWarm regards,\n\n──────────\n\n[한국어]\n\n안녕하세요, 택토 담당자님.\n\n택토에서 백엔드 개발자, SEO 풀스택 개발자, 경영전략 기획까지 여러 포지션을 채용 중이신 것을 보고 연락드립니다. 세 방향으로 동시에 SaaS 제품을 성장시키는 일은 분명 설레는 일이지만, 그만큼 좋은 인재를 빠르게 채우는 것이 쉽지 않으실 것 같습니다. 저희 Springboard Philippines는 택토와 같은 한국 SaaS 기업이 검증된 필리핀 IT 인재를 빠르게 합류시킬 수 있도록 돕고 있어, 긴 채용 기간에 대한 부담을 덜어드릴 수 있습니다. 지금 진행 중이신 채용에 가볍고 빠른 보완책이 될 수 있을 것 같습니다. 혹시 15분 정도 짧은 통화로 도움이 될 수 있을지 이야기 나눠볼 수 있을까요?\n\n감사합니다."}, {"company": "아이알큐더스", "service": "it_servicing", "fit": 54.0, "hiring": "3", "industry": "핀테크/리걸테크", "tech": "", "region": "서울 영등포", "roles": "Senior 풀스택 개발자, Mid-level 풀스택 개발자, 개발 총괄 TL", "url": "", "contact_name": "", "contact_title": "", "email": "", "linkedin": "", "verdict": "maybe", "confidence": "medium", "reason": "Fintech/legaltech and size (70) fit the ICP, but only one clearly mid-level developer role is listed (the others are senior and a team lead), so the mid-level hiring signal is too weak for a 'fit'.", "message": "[English]\n\nHi there — I noticed 아이알큐더스 is currently hiring // Levenshtein edit distance (for typo tolerance)
function lev(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  let prev=Array.from({length:n+1},(_,i)=>i);
  for(let i=1;i<=m;i++){ const cur=[i];
    for(let j=1;j<=n;j++){ cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1)); }
    prev=cur; }
  return prev[n];
}

const ALIAS = {"데이터 엔지니어":"data engineer","데이터엔지니어":"data engineer",

// all searchable text: name + industry + tech + service + region + job roles (+ English aliases)
function hay(d){
  let t = (d.company+' '+(d.industry||'')+' '+(d.tech||'')+' '+(SVC[d.service]||d.service||'')+' '+d.service+' '+(d.region||'')+' '+(d.roles||'')).toLowerCase();
  for(const k in ALIAS){ if(t.indexOf(k.toLowerCase())>=0) t += ' '+ALIAS[k]; }
  return t;
}
// fuzzy substring: slide a window over the text and compare each to the term
function fuzzyHas(text,term){
  if(text.includes(term)) return true;
  const L=term.length, max = L<=2?0 : (L<=5?1:2);
  if(max===0) return false;
  for(let i=0;i<=text.length-1;i++){
    for(let w=Math.max(1,L-max); w<=L+max; w++){
      if(i+w>text.length) continue;
      if(lev(text.substr(i,w),term)<=max) return true;
    }
  }
  return false;
}
// match: exact across all fields, OR typo-tolerant on the company name
function matches(d,term){
  if(!term) return true;
  return hay(d).includes(term) || fuzzyHas(d.company.toLowerCase(), term);
}

function filtered(){
  const term=q.value.toLowerCase().trim(), fs=svc.value, fv=vd.value;
  return DATA.filter(d=> matches(d,term) && (!fs||d.service===fs) && (!fv||d.verdict===fv))

}
