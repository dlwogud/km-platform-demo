  :root{

<script>
const DATA = [{"company": "플래티어", "company_en": "", "service": "it_servicing", "fit": 70.0, "hiring": "7", "industry": "IT, 컨텐츠", "tech": "AI", "region": "서울 송파구", "roles": "[AI CX사업부문] QA 엔지니어, [AI CX사업부문] AI 엔지니어, [SaaS 솔루션] 데이터 분석가, [AI CX사업부문] 데브옵스 엔지니어, [IDT 사업부문] 아틀라시안 솔루션 엔지니어, [AI CX사업부문] 데이터 엔지니어, [IDT사업부문] UI/UX 테스트 자동화 솔루션 엔지니어", "url": "https://www.wanted.co.kr/wd/374870", "contact_name": "", "contact_title": "", "email": "", "linkedin": "", "verdict": "fit", "confidence": "high", "reason": "Platteer is a tech-enabled company (SaaS/e-commerce/IT services), has ~280 employees within the 20-300 range, and shows strong hiring pressure with multiple mid-level QA, DevOps, and data engineering openings.", "message": "[English]\n\nHi there — I noticed 플래티어 is actively growing several teams right now, with open roles across your AI CX division for QA, AI, and data engineers, plus DevOps and Atlassian specialists. Scaling seven technical positions at once, especially in AI-focused areas, is a real challenge in today's hiring market. At Springboard Philippines, we help Korean companies like yours access pre-vetted Filipino IT talent who can plug into these exact roles and start delivering quickly. It's a flexible way to build out engineering and data capacity without the long lead times of local hiring. Would you be open to a quick 15-minute call to see if this could be a fit for your current needs? No pressure at all — just happy to share what's worked for other teams.\n\n──────────\n\n[한국어]\n\n안녕하세요, 플래티어에서 현재 여러 팀을 적극적으로 확장하고 계신 것을 보았습니다. 특히 AI CX사업부문의 QA·AI·데이터 엔지니어를 비롯해 데브옵스, 아틀라시안 솔루션 엔지니어까지 다양한 기술 직군을 채용 중이신 것으로 알고 있습니다. 요즘 채용 시장에서 7개의 기술 포지션을, 그것도 AI 중심 영역에서 동시에 충원하는 일이 결코 쉽지 않으실 것 같습니다. 저희 Springboard Philippines는 검증된 필리핀 IT 인재를 통해 이러한 직무에 바로 투입되어 빠르게 성과를 낼 수 있도록 한국 기업들을 지원하고 있습니다. 국내 채용의 긴 소요 시간 없이 엔지니어링·데이터 역량을 유연하게 확충하실 수 있는 방법입니다. 혹시 현재 필요하신 부분에 도움이 될 수 있을지, 15분 정도 짧게 통화 나눠볼 수 있을까요? 부담 갖지 않으셔도 되며, 다른 팀들에게 효과가 있었던 방식을 편하게 공유드리고자 합니다."}, {"company": "애자일소다", "company_en": "", "service": "it_servicing", "fit": 70.0, "hiring": "7", "industry": "IT, 컨텐츠", "tech": "AI", "region": "서울 강남구", "roles": "AI service Backend Engineer, RAG/Data 엔지니어, AI Agent Engineer, AI Agent Platform Engineer, AI 문서 분석 전문가, AI 플랫폼 시스템 엔지니어, 생성형 AI 데이터 사이언티스트", "url": "https://www.wanted.co.kr/wd/374887", "contact_name": "", "contact_title": "", "email": "", "linkedin": "", "verdict": "maybe", "confidence": "medium", "reason": "Tech-enabled AI/IT company with confirmed size (162) in range, but the 7 open roles are specialized AI engineering/data science positions that appear senior/expert-focused rather than the mid-level dev/QA/DevOps/CX roles the ICP targets.", "message": "[English]\n\nHi there — I noticed 애자일소다 is hiring across seven AI-focused roles right now, from RAG/Data engineers to AI Agent and platform engineers. That's an ambitious build-out, and I imagine finding enough senior AI and backend talent on that timeline is one of the tougher parts. At Springboard Philippines, we help Korean companies extend their engineering teams with pre-vetted Filipino AI and backend specialists who can plug in quickly and work in your time zone. It's a practical way to keep momentum on your roadmap while your in-house hiring catches up. Would you be open to a quick 15-minute call to see if it's a fit? No pressure either way — happy to share how we've supported similar AI-heavy teams.\n\n──────────\n\n[한국어]\n\n안녕하세요, 애자일소다에서 현재 RAG/Data 엔지니어부터 AI Agent 및 플랫폼 엔지니어까지 AI 중심의 일곱 개 포지션을 채용 중이신 것을 보고 연락드립니다. 상당히 의욕적인 확장 계획으로 보이는데, 이 일정에 맞춰 시니어급 AI·백엔드 인재를 충분히 확보하는 일이 쉽지 않은 부분 중 하나이지 않을까 생각됩니다. 저희 Springboard Philippines는 한국 기업들이 사전 검증된 필리핀 AI·백엔드 전문 인력으로 엔지니어링 팀을 빠르게 보강하실 수 있도록 지원하고 있으며, 유사한 시간대에서 바로 협업이 가능합니다. 사내 채용이 진행되는 동안에도 로드맵의 속도를 유지하실 수 있는 실질적인 방법이 될 수 있습니다. 혹시 저희가 도움이 될 수 있을지 편하게 확인해보실 수 있도록 15분 정도 짧은 통화를 나눠볼 수 있을까요? 부담 없이, AI 중심 팀들을 어떻게 지원해왔는지 기꺼이 공유드리겠습니다."}, {"company": "풀림", "company_en": "", "service": "it_servicing", "fit": 70.0, "hiring": "5", "industry": "IT, 컨텐츠", "tech": "Python, Next.js", "region": "서울 강남구", "roles": "[신사업] 프론트 엔지니어 3년 이상, 풀스택 엔지니어(Next.js) 3년 이상, 웹 스크래핑 엔지니어 2년 이상, 백엔드 엔지니어 7년 이상, 백엔드 엔지니어 (Python) 2년 이상", "url": "https://www.wanted.co.kr/wd/374756", "contact_name": "", "contact_title": "", "email": "", "linkedin": "", "verdict": "maybe", "confidence": "medium", "reason": "Tech-enabled (IT/content) with strong hiring signal (5 mid-level dev roles), but company size is unknown, which under the strict rubric prevents a 'fit' verdict.", "message": "[English]\n\nHi 풀림 team,\n\nI noticed you're growing your engineering team across several roles right now—from frontend and full-stack (Next.js) to Python backend and web scraping engineers—which is a strong signal your new business initiative is picking up real momentum. Building out five technical roles at once is no small task, especially when you need people who can hit the ground running with your stack. At Springboard Philippines, we help Korean companies like yours bring on pre-vetted Filipino engineers with exactly this kind of experience (Python, Next.js, and beyond), often at a meaningful cost advantage and with fast ramp-up. It could be a helpful way to fill some of these seats without stretching your local hiring timeline. Would you be open to a quick 15-minute call to see if it's a fit?\n\nWarm regards,\n\n──────────\n\n[한국어]\n\n풀림 담당자님, 안녕하세요.\n\n최근 프론트엔드와 풀스택(Next.js)부터 Python 백엔드, 웹 스크래핑 엔지니어까지 여러 직군에서 개발팀을 확장하고 계신 것을 보았습니다. 신사업이 본격적으로 탄력을 받고 있다는 좋은 신호라고 생각되며, 다섯 개의 기술 포지션을 동시에 채용하는 일이 결코 간단하지 않다는 점도 잘 알고 있습니다. 저희 Springboard Philippines는 풀림처럼 빠른 성장을 준비하는 한국 기업에, Python과 Next.js를 포함한 검증된 필리핀 개발 인력을 합리적인 비용과 빠른 온보딩으로 연결해 드리고 있습니다. 로컬 채용 일정에 부담을 더하지 않으면서 일부 포지션을 채우는 데 도움이 될 수 있을 것 같습니다. 혹시 적합 여부를 가볍게 확인해 볼 수 있도록 15분 정도 짧은 통화가 가능하실까요?\n\n감사합니다."}, {"company": "지비소프트", "company_en": "", "service": "it_servicing", "fit": 70.0, "hiring": "5", "industry": "IT, 컨텐츠", "tech": "", "region": "서울 강남구", "roles": "프로덕트 매니저 / 오너 (PdM·P const SVC = {it_servicing:"IT Servicing", manpower:"Manpower", ai_implementation:"AI Implementation", systems_integration:"Systems Integration"};
const VICON = {fit:"✅", maybe:"🟡", not_fit:"❌"};
let sortKey="fit", sortDir=-1, selected=null;

const svc = document.getElementById("svc"), q = document.getElementById("q"), vd = document.getElementById("vd");

[...new Set(DATA.map(d=>d.service).filter(Boolean))].forEach(s=>{
  const o=document.createElement("option");o.value=s;o.textContent=SVC[s]||s;svc.appendChild(o);});

function sortBy(k){ sortDir = (sortKey===k)? -sortDir : (k==="fit"?-1:1); sortKey=k; render(); }

// Levenshtein edit distance (for typo tolerance)
function lev(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  let prev=Array.from({length:n+1},(_,i)=>i);
  for(let i=1;i<=m;i++){ const cur=[i];
    for(let j=1;j<=n;j++){ cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1)); }
    prev=cur; }
  return prev[n];
}
// Korean role/tech term -> English alias, so English searches hit Korean data
const ALIAS = {"데이터 엔지니어":"data engineer","데이터엔지니어":"data engineer",
  "백엔드":"backend","프론트엔드":"frontend","서버 개발":"server developer","서버":"server",

  "머신러닝":"machine learning ml","테스트":"qa test","개발자":"developer","시스템 엔지니어":"system engineer",
  "핀테크":"fintech","이커머스":"ecommerce","게임":"gaming game","보안":"security","물류":"logistics","제조":"manufacturing"};
// all searchable text: name + industry + tech + service + region + job roles (+ English aliases)
function hay(d){
  let t = (d.company+' '+(d.company_en||'')+' '+(d.industry||'')+' '+(d.tech||'')+' '+(SVC[d.service]||d.service||'')+' '+d.service+' '+(d.region||'')+' '+(d.roles||'')).toLowerCase();
  for(const k in ALIAS){ if(t.indexOf(k.toLowerCase())>=0) t += ' '+ALIAS[k]; }
  return t;
}
// fuzzy substring: slide a window over the text and compare each to the term
function fuzzyHas(text,term){
  if(text.includes(term)) return true;
  const L=term.length, max = L<=2?0 : (L<=5?1:2);
  if(max===0) return false;
  for(let i=0;i<=text.length-1;i++){
    for(let w=Math.max(1,L-max); w<=L+max; w++){
      if(i+w>text.length) continue;
      if(lev(text.substr(i,w),term)<=max) return true;
    }
  }
  return false;
}
// match: exact across all fields, OR typo-tolerant on the company name
function matches(d,term){
  if(!term) return true;
  return hay(d).includes(term) || fuzzyHas(d.company.toLowerCase(), term);
}

function filtered(){
  const term=q.value.toLowerCase().trim(), fs=svc.value, fv=vd.value;
  return DATA.filter(d=> matches(d,term) && (!fs||d.service===fs) && (!fv||d.verdict===fv))

}

function pill(v){ return '<span class="pill pill-'+v+'">'+(VICON[v]||'')+' '+(v||'-')+'</span>'; }

  if(rows.length && !rows.find(r=>r.company===selected)) select(rows[0].company); else drawDetail();
}

    +'<div class="sec"><div class="lbl">🤖 AI qualification</div>'

      +(d.message?editableDraft():'<div class="empty">no draft yet — run generate_messages.py</div>')+'</div>';
